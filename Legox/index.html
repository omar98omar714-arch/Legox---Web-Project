<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legox Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form action="./Fahmy/web.html" method="post" class="login-form">
            <img src="./images/legox.png" alt="Legox Logo" class="form-logo">
            
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="username" class="inputform" required><br><br>
            
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" class="inputform" placeholder="password" required><br><br>
            
            <input type="submit" value="Submit" class="submit-btn">
        </form>
    </div>
</body>
</html>
